# CI — Lint, type-check, and build on every push and pull request
#
# Runs:
#   1. Lint      — ESLint on all source files
#   2. Typecheck — nuxt typecheck (vue-tsc under the hood)
#   3. Build     — production Nuxt build (verifies the app compiles correctly)
#
# Subsequent workflows (deploy-staging, deploy-production) depend on this
# workflow completing successfully.

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  # Provide safe placeholder values so the build doesn't fail on missing vars
  NUXT_PUBLIC_APP_NAME: "Enterprise Platform"
  NUXT_PUBLIC_APP_URL: "http://localhost:3000"
  NUXT_PUBLIC_API_BASE_URL: "http://localhost:3001"
  NUXT_PUBLIC_AUTH_BASE_URL: "http://localhost:3001"
  NUXT_PUBLIC_ENABLE_PWA: "true"
  NUXT_PUBLIC_ENABLE_SEO: "true"
  NUXT_PUBLIC_DEFAULT_TENANT: "default"

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Type-check ───────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  # ── 3. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-output
          path: .output/
          retention-days: 7

  # ── 4. Docker image build (dry-run, no push) ─────────────────────────────────
  docker-build:
    name: Docker Build (dry-run)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: nuxt4-boilerplate:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
